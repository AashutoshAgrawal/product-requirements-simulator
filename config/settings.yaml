# Pipeline Configuration Settings

# LLM Configuration
llm:
  provider: "openai"
  model_name: "gpt-4o-mini"  # Options: "gpt-4o-mini", "gpt-4o" (Note: gpt-5 models only support temp=1)
  temperature: 0.0  # Lower values reduce randomness (0 = most deterministic)
  seed: 42  # Optional: set for more reproducible outputs
  max_retries: 3
  retry_delay: 2
  rate_limit_delay: 0

# Agent Generation Settings
agent_generation:
  default_n_agents: 1
  default_design_context: "camping tent"

# Experience Simulation Settings
experience_simulation:
  default_product: "tent"
  n_steps: 3

# Interview Settings
interview:
  max_followup_questions: 2

# Need Extraction Settings
need_extraction:
  categories:
    - Functional
    - Usability
    - Performance
    - Safety
    - Emotional
    - Social
    - Accessibility
  priority_levels:
    - High
    - Medium
    - Low

# Output Settings
output:
  save_intermediate_results: false
  export_format: "json"
  results_directory: "results"

# Logging Configuration
logging:
  level: "INFO"  # Options: DEBUG, INFO, WARNING, ERROR, CRITICAL
  log_file: null  # Set to a filename to enable file logging
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"

# Web Application Configuration
web_app:
  host: "127.0.0.1"
  port: 5000
  debug: true
  enable_caching: false
